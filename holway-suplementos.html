<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suplementos Deportivos · Francis Holway</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0c0c10;color:#e2e2ea;min-height:100vh}
button{cursor:pointer;font-family:'DM Sans',sans-serif}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;letter-spacing:0.03em}
.tag-a{background:rgba(34,197,94,0.15);color:#22c55e;border:1px solid rgba(34,197,94,0.3)}
.tag-b{background:rgba(245,158,11,0.15);color:#f59e0b;border:1px solid rgba(245,158,11,0.3)}
.tag-c{background:rgba(249,115,22,0.15);color:#f97316;border:1px solid rgba(249,115,22,0.3)}
.tag-d{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3)}
.row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;border-radius:8px;transition:background 0.15s}
.row:hover{background:rgba(255,255,255,0.04)}
.filter-btn{padding:6px 12px;font-size:12px;border-radius:20px;border:1px solid rgba(255,255,255,0.12);background:transparent;color:#888;font-weight:600;transition:all 0.15s;cursor:pointer}
.filter-btn:hover{border-color:rgba(255,255,255,0.25);color:#ccc}
.active-all{background:#6366f1!important;color:#fff!important;border-color:#6366f1!important}
.active-a{background:#22c55e!important;color:#000!important;border-color:#22c55e!important}
.active-b{background:#f59e0b!important;color:#000!important;border-color:#f59e0b!important}
.active-c{background:#f97316!important;color:#000!important;border-color:#f97316!important}
.active-d{background:#ef4444!important;color:#fff!important;border-color:#ef4444!important}
.view-btn{padding:5px 14px;font-size:13px;border:none;border-radius:6px;background:transparent;color:#666;font-weight:500;transition:all 0.15s;cursor:pointer}
.view-btn.active{background:rgba(255,255,255,0.1);color:#fff}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 12px;font-size:11px;color:#555;text-transform:uppercase;letter-spacing:0.07em;border-bottom:1px solid rgba(255,255,255,0.07);font-weight:600}
td{padding:10px 12px;font-size:14px;border-bottom:1px solid rgba(255,255,255,0.04)}
tr:hover td{background:rgba(255,255,255,0.03)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:flex-end;justify-content:center;z-index:100;backdrop-filter:blur(6px)}
.panel{background:#14141c;border-radius:20px 20px 0 0;width:100%;max-width:680px;max-height:88vh;overflow-y:auto;padding:24px 24px 40px}
@keyframes shimmer{0%,100%{opacity:0.3}50%{opacity:0.7}}
</style>
</head>
<body>

<div style="max-width:900px;margin:0 auto;padding:0 1rem 4rem">

  <!-- HEADER -->
  <div id="header" style="position:sticky;top:0;background:#0c0c10;border-bottom:1px solid rgba(255,255,255,0.06);padding:14px 0 10px;z-index:10">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:0.08em;background:linear-gradient(135deg,#fff,#777);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:2px">Suplementos Deportivos</div>
    <div style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px">Clasificación AIS · Francis Holway · Basado en evidencia científica</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <div style="display:flex;background:rgba(255,255,255,0.05);border-radius:8px;padding:3px;gap:2px;border:1px solid rgba(255,255,255,0.07)">
        <button class="view-btn active" onclick="setView('list',this)">≡ Lista</button>
        <button class="view-btn" onclick="setView('table',this)">⊞ Tabla</button>
      </div>
      <div style="display:flex;gap:4px;flex-wrap:wrap" id="filters">
        <button class="filter-btn active-all" onclick="setFilter('ALL',this)">Todos</button>
        <button class="filter-btn" onclick="setFilter('A',this)">A · Aprobados</button>
        <button class="filter-btn" onclick="setFilter('B',this)">B · En evaluación</button>
        <button class="filter-btn" onclick="setFilter('C',this)">C · Sin efecto</button>
        <button class="filter-btn" onclick="setFilter('D',this)">D · No usar</button>
      </div>
    </div>
  </div>

  <div id="content" style="margin-top:12px"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="panel" id="panel"></div>
</div>

<script>
const GROUPS={
  A:{label:"Aprobados",color:"#22c55e",bg:"rgba(34,197,94,0.08)",border:"rgba(34,197,94,0.25)",cls:"tag-a"},
  B:{label:"En evaluación",color:"#f59e0b",bg:"rgba(245,158,11,0.08)",border:"rgba(245,158,11,0.25)",cls:"tag-b"},
  C:{label:"Sin efecto",color:"#f97316",bg:"rgba(249,115,22,0.08)",border:"rgba(249,115,22,0.25)",cls:"tag-c"},
  D:{label:"No usar",color:"#ef4444",bg:"rgba(239,68,68,0.08)",border:"rgba(239,68,68,0.25)",cls:"tag-d"},
};

const S=[
  {id:1,g:"A",name:"Bebidas deportivas y geles",verdict:"✅ Usar en deportes >60 min.",science:"CHO de rápida absorción + electrolitos. Consenso COI 2018: 30-60 g CHO/h mejoran rendimiento en eventos prolongados. El sodio facilita reabsorción y estimula la sed.",dose:"30–60 g CHO/h + 500–700 mg sodio/L"},
  {id:2,g:"A",name:"Proteína de suero (Whey)",verdict:"✅ Efectiva para hipertrofia y recuperación.",science:"Rica en leucina (~11%), aminoácido clave para activar mTOR y síntesis proteica muscular. Meta-análisis BJSM 2018 (n=1800+): aumenta masa y fuerza con entrenamiento.",dose:"20–40 g post-entrenamiento; 1.6–2.2 g/kg/día total"},
  {id:3,g:"A",name:"Cafeína",verdict:"✅ Uno de los ergogénicos más efectivos.",science:"Antagonista de receptores de adenosina: reduce percepción de esfuerzo y fatiga. Grgic et al. 2020 (300+ estudios): mejora resistencia aeróbica +2-4%, potencia, velocidad y fuerza.",dose:"3–6 mg/kg, 45-60 min antes del ejercicio"},
  {id:4,g:"A",name:"Creatina monohidrato",verdict:"✅ Mayor evidencia para potencia, fuerza e hipertrofia.",science:"+500 ensayos clínicos. Aumenta reservas de fosfocreatina muscular mejorando resíntesis de ATP. Meta-análisis JISSN y BJSM: +5-15% en fuerza y potencia anaeróbica.",dose:"3–5 g/día mantenimiento. Carga: 20 g/día x 5-7 días (opcional)"},
  {id:5,g:"A",name:"Bicarbonato de sodio",verdict:"✅ Efectivo en esfuerzos de alta intensidad.",science:"Tamponador extracelular de H⁺. Retrasa acidosis muscular en esfuerzos de 1-10 min. Carr et al.: mejora rendimiento en ~2% en pruebas de alta intensidad.",dose:"0.2–0.3 g/kg, 60-90 min antes, con abundante agua"},
  {id:6,g:"A",name:"Vitamina D",verdict:"✅ Suplementar si hay deficiencia (muy frecuente).",science:"Alta prevalencia de déficit en atletas de interiores y latitudes altas. Roles en función muscular, inmunidad y salud ósea. Farrokhyar 2015: correlación con VO₂max.",dose:"1.000–4.000 UI/día según niveles séricos basales"},
  {id:7,g:"A",name:"Probióticos",verdict:"✅ Reducen enfermedades en temporadas de carga alta.",science:"Huang et al. 2021: reducen incidencia y duración de ITRS en atletas. Mejoran integridad intestinal bajo estrés físico. Efecto dependiente de cepa y dosis.",dose:"≥10⁹ UFC/día de cepa específica (ej. L. rhamnosus GG)"},
  {id:8,g:"A",name:"Calcio, Hierro, Zinc",verdict:"✅ Solo si hay deficiencia confirmada por análisis.",science:"Alta prevalencia de déficit en atletas. Deficiencia de hierro deteriora VO₂max. Zinc afecta inmunidad. Sin déficit verificado, no hay beneficio ergogénico.",dose:"Según análisis. Hierro: 18–45 mg/día. Zinc: 8–11 mg/día"},
  {id:9,g:"A",name:"Multivitamínico",verdict:"✅ Útil como red de seguridad en dietas restrictivas.",science:"Beneficioso en atletas en déficit calórico (Woolf & Manore 2006). Sin efecto ergogénico en atletas bien nutridos con dieta variada.",dose:"1 comprimido/día con dosis diaria recomendada. No megadosis."},
  {id:10,g:"A",name:"Barras deportivas",verdict:"✅ Práctica, no mágica. Ventaja logística.",science:"CHO + proteína con composición controlada. AIS las incluye como 'sports food' Grupo A por practicidad y efectividad.",dose:"1 barra (30–50 g CHO) 1h antes o inmediatamente post-entreno"},
  {id:11,g:"A",name:"Comidas líquidas",verdict:"✅ Útiles post-ejercicio, viajes y apetito suprimido.",science:"COI las clasifica como alimentos deportivos Grupo A. Facilitan ventana anabólica post-entrenamiento.",dose:"20–40 g proteína + CHO según demanda energética"},
  {id:12,g:"A",name:"Glicerol",verdict:"⚠️ Útil en calor extremo. Legal desde 2018.",science:"Hiperhidratante. +600-700 mL retención de agua. Removido de lista WADA en 2018. AIS evidencia moderada-alta.",dose:"1 g/kg + 26 mL/kg de líquido, 60-90 min antes"},
  {id:13,g:"B",name:"Beta-alanina",verdict:"⚠️ Efectiva para esfuerzos de 1-4 min.",science:"Precursor de carnosina muscular (tampón intracelular H⁺). Hobson et al.: +2.85% en ejercicios de 60–240 s. El COI la reconoce con evidencia sólida (AIS la tiene en B).",dose:"3.2–6.4 g/día en dosis divididas durante ≥4 semanas"},
  {id:14,g:"B",name:"Nitratos (remolacha/beetroot)",verdict:"⚠️ Más efectivo en atletas recreativos.",science:"Convierte a óxido nítrico (NO), mejora eficiencia mitocondrial. Jones 2018: menor efecto en atletas de élite altamente entrenados.",dose:"~400 mg nitratos (≈500 mL jugo de remolacha), 2-3 h antes"},
  {id:15,g:"B",name:"Aceites de pescado (Omega-3)",verdict:"⚠️ Prometedor para recuperación y salud general.",science:"Smith et al. 2011: 4 g EPA+DHA/día aumenta síntesis proteica muscular. Propiedades antiinflamatorias documentadas.",dose:"2–4 g/día EPA+DHA combinados"},
  {id:16,g:"B",name:"Colágeno",verdict:"⚠️ Útil para tendones y ligamentos. No para músculo.",science:"Shaw 2017: 15 g hidrolizado + vitamina C antes de ejercicio de impacto aumenta marcadores de síntesis de colágeno.",dose:"15 g hidrolizado + vitamina C, 60 min antes del ejercicio"},
  {id:17,g:"B",name:"Polifenoles (frutas)",verdict:"⚠️ Útiles como alimento funcional para recuperación.",science:"Jugo de cereza ácida (Montmorency): reduce daño muscular post-ejercicio. Resultados reproducibles.",dose:"Jugo de cereza: 30 mL concentrado 2x/día"},
  {id:18,g:"B",name:"Cúrcuma (curcumina)",verdict:"⚠️ Potencial antiinflamatorio limitado por biodisponibilidad.",science:"Inhibe NF-κB y COX-2. Biodisponibilidad oral extremadamente baja (<1%). Formulaciones con piperina mejoran absorción.",dose:"500-1000 mg/día de curcumina con piperina (BioPerine)"},
  {id:19,g:"B",name:"HMB (β-hidroxi β-metilbutirato)",verdict:"⚠️ Posible beneficio en personas no entrenadas.",science:"Metabolito de leucina con posible efecto anticatabólico. Evidencia mixta. Sin ventaja en atletas ya entrenados.",dose:"3 g/día si se decide usar"},
  {id:20,g:"B",name:"Carnitina",verdict:"⚠️ Sin evidencia consistente en deportistas sanos.",science:"No aumenta niveles musculares significativamente con suplementación oral. Revisiones sistemáticas no muestran mejoras en rendimiento.",dose:"Sin protocolo establecido por evidencia insuficiente"},
  {id:21,g:"B",name:"Antioxidantes C y E (dosis altas)",verdict:"⚠️ Contraindicados en uso crónico durante entrenamiento.",science:"Paradoja: las ROS son señales necesarias para adaptaciones. Merry & Ristow 2016: bloquean biogénesis mitocondrial.",dose:"Solo como corrección de deficiencia. Evitar megadosis crónicas."},
  {id:22,g:"B",name:"Cetonas exógenas",verdict:"⚠️ Sin evidencia suficiente. Alto costo.",science:"Evans et al. 2022: no mejoras consistentes en resistencia. En algunos estudios perjudican uso de glucógeno.",dose:"Sin protocolo establecido por evidencia inconsistente"},
  {id:23,g:"B",name:"Jugo de encurtidos (Pickle juice)",verdict:"⚠️ Evidencia emergente solo para calambres.",science:"Miller et al. 2010: reduce calambres inducidos en ~45%. Efecto neurológico (muy rápido para ser osmótico).",dose:"~80 mL ante calambres agudos"},
  {id:24,g:"B",name:"NAC (N-Acetil Cisteína)",verdict:"⚠️ No recomendado en uso crónico en atletas.",science:"Precursor del glutatión. Puede interferir con adaptaciones al entrenamiento si se usa crónicamente.",dose:"600-1800 mg/día solo en períodos específicos"},
  {id:25,g:"B",name:"Mentol (estimulante del sabor)",verdict:"⚠️ Útil como estrategia sensorial en calor.",science:"Activa receptores TRPM8 en boca sin reducir temperatura central. Mejora percepción térmica y tolerancia.",dose:"Enjuague bucal con solución de mentol 0.01%"},
  {id:26,g:"B",name:"Pre/probióticos",verdict:"⚠️ Prometedores para salud intestinal.",science:"AIS Grupo B con investigación activa. Evidencia creciente eje intestino-rendimiento-inmunidad. Sin efecto ergogénico directo demostrado.",dose:"Inulina: 5-10 g/día. Probióticos: ver ítem específico."},
  {id:27,g:"C",name:"BCAA (Aminoácidos ramificados)",verdict:"❌ Innecesarios con suficiente proteína de calidad.",science:"Wolfe 2017; Morton et al.: BCAA solos son inferiores a proteína completa para estimular síntesis proteica. Mercadotecnia sobre ciencia.",dose:"Mejor invertir en proteína completa (whey, huevo, carne)"},
  {id:28,g:"C",name:"Cromo",verdict:"❌ Sin beneficio demostrado en atletas sanos.",science:"Althuis et al. 2002 (20+ ECA): sin efectos significativos en glucosa, masa muscular ni composición corporal.",dose:"No recomendado"},
  {id:29,g:"C",name:"Coenzima Q10",verdict:"❌ Sin efecto ergogénico en deportistas sanos.",science:"CoQ10 muscular no aumenta significativamente con suplementación oral. Meta-análisis no muestran mejoras en VO₂max.",dose:"No recomendado para rendimiento deportivo"},
  {id:30,g:"C",name:"Ginseng",verdict:"❌ Evidencia científica insuficiente.",science:"Bahrke & Morgan 2000: estudios de baja calidad metodológica con resultados contradictorios. Sin mejora aeróbica demostrada.",dose:"No recomendado"},
  {id:31,g:"C",name:"Glucosamina",verdict:"❌ Sin beneficio preventivo en articulaciones sanas.",science:"GAIT trial (NEJM, 2006, n>1600): sin beneficio significativo vs placebo en personas sin artritis severa.",dose:"Solo en artrosis ya diagnosticada: 1500 mg/día"},
  {id:32,g:"C",name:"Aceite MCT",verdict:"❌ No mejora rendimiento. Problemas GI en dosis necesarias.",science:"Van Zyl et al.: no mejoran rendimiento de resistencia. En dosis para tener efecto causan malestar gastrointestinal severo.",dose:"No recomendado como ergogénico"},
  {id:33,g:"C",name:"Inosina",verdict:"❌ Sin efecto. Potencialmente perjudicial en dosis altas.",science:"Williams et al. 1990: sin mejoras en VO₂max ni rendimiento en ciclistas. Dosis altas aumentan ácido úrico (riesgo de gota).",dose:"No recomendado"},
  {id:34,g:"C",name:"Magnesio",verdict:"⚠️ Sin déficit verificado: no hay beneficio ergogénico.",science:"Esencial para >300 reacciones enzimáticas. La deficiencia sí deteriora el rendimiento, pero muchos atletas tienen déficit subclínico sin saberlo.",dose:"Solo si hay déficit confirmado: 300-400 mg/día"},
  {id:35,g:"C",name:"Ácido alfa-lipoico",verdict:"❌ Sin beneficio en deportistas sanos.",science:"AIS Grupo C. Sin evidencia de mejora en rendimiento deportivo en personas sanas.",dose:"No recomendado como ergogénico"},
  {id:36,g:"C",name:"Vitamina E (dosis altas)",verdict:"❌ Interfiere con adaptaciones al ejercicio.",science:"Ristow et al. 2009 (PNAS): suplementación C+E previene mejoras en sensibilidad a la insulina inducidas por ejercicio.",dose:"Solo desde la dieta (aceites, frutos secos). No suplementar."},
  {id:37,g:"C",name:"Fosfatos",verdict:"❌ Evidencia inconsistente.",science:"Estudios modernos con mejor metodología no replican consistentemente mejoras históricas en VO₂max.",dose:"No recomendado"},
  {id:38,g:"C",name:"Tirosina",verdict:"❌ Sin beneficio ergogénico en condiciones normales.",science:"Posible efecto cognitivo en privación de sueño o estrés extremo. Sin mejoras consistentes en rendimiento físico.",dose:"No recomendado para rendimiento deportivo estándar"},
  {id:39,g:"D",name:"Efedrina",verdict:"🚫 PROHIBIDA. Extremadamente peligrosa.",science:"150+ muertes documentadas en EE.UU. Hipertensión, arritmias, infartos, ACV. Prohibida FDA 2004 y WADA.",dose:"PROHIBIDA – No usar bajo ninguna circunstancia"},
  {id:40,g:"D",name:"Sibutramina",verdict:"🚫 Retirada del mercado. Causa infartos y ACV.",science:"Estudio SCOUT (NEJM): aumenta significativamente riesgo cardiovascular. Frecuente como adulterante ilegal en suplementos.",dose:"PROHIBIDA"},
  {id:41,g:"D",name:"SARMs (Ostarine, Ligandrol, Andarine)",verdict:"🚫 Ilegales para uso humano. PROHIBIDOS WADA.",science:"No aprobados por ninguna agencia regulatoria. Hepatotoxicidad, supresión HPG, riesgo cardiovascular. Frecuentes en suplementos comerciales.",dose:"PROHIBIDOS"},
  {id:42,g:"D",name:"GHRP-1 y 2 / Péptidos de GH",verdict:"🚫 PROHIBIDOS WADA. Riesgos graves de salud.",science:"Retención de líquidos, resistencia a insulina, síndrome del túnel carpiano. No aprobados para uso en seres humanos sanos.",dose:"PROHIBIDOS"},
  {id:43,g:"D",name:"DHEA",verdict:"🚫 PROHIBIDA WADA. Riesgo real de positivo.",science:"Conversión a testosterona mínima e inconsistente en adultos jóvenes. Prohibida por WADA. Riesgo de positivo en doping.",dose:"PROHIBIDA en deporte competitivo"},
  {id:44,g:"D",name:"Androstenediona",verdict:"🚫 PROHIBIDA WADA. No efectiva.",science:"King et al. (JAMA, 1999): NO aumenta testosterona pero SÍ aumenta estradiol (feminización). Prohibida por WADA.",dose:"PROHIBIDA"},
  {id:45,g:"D",name:"Maca (Lepidium meyenii)",verdict:"❌ Sin evidencia de beneficio. Marketing puro.",science:"Lee et al. 2016: NO mejora testosterona, NO mejora rendimiento físico. El AIS la ubica en Grupo D.",dose:"No recomendada"},
  {id:46,g:"D",name:"Higenamina",verdict:"🚫 PROHIBIDA WADA desde 2017.",science:"Frecuente en pre-workouts como ingrediente 'natural'. Múltiples atletas suspendidos por positivos inadvertidos.",dose:"PROHIBIDA"},
  {id:47,g:"D",name:"Sinefrina",verdict:"🚫 PROHIBIDA WADA. Riesgo cardiovascular.",science:"Alcaloide de naranja amarga. Riesgo cardiovascular especialmente con cafeína. Común en quemadores de grasa.",dose:"PROHIBIDA en deporte competitivo"},
  {id:48,g:"D",name:"Estricnina",verdict:"🚫 VENENO. Dosis letal ~1-2 mg/kg.",science:"Antagonista de receptores de glicina. Históricamente usada en 'tónicos' deportivos. Thomas Hicks en maratón olímpica 1904.",dose:"PROHIBIDA. TÓXICA."},
];

let currentFilter="ALL", currentView="list", currentSupp=null, aiText=null, aiLoading=false;

function getFiltered(){return currentFilter==="ALL"?S:S.filter(s=>s.g===currentFilter);}

function renderContent(){
  const filtered=getFiltered();
  const el=document.getElementById("content");
  if(currentView==="list"){
    let html="";
    ["A","B","C","D"].filter(g=>currentFilter==="ALL"||currentFilter===g).forEach(g=>{
      const grp=GROUPS[g];
      const items=filtered.filter(s=>s.g===g);
      if(!items.length)return;
      html+=`<div style="margin-bottom:1.5rem">
        <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid ${grp.border};margin-bottom:6px">
          <span style="font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:${grp.color}">${g}</span>
          <div><div style="font-weight:600;font-size:14px;color:${grp.color}">${grp.label}</div><div style="font-size:11px;color:#555">${items.length} suplementos</div></div>
        </div>
        ${items.map(s=>`<div class="row" onclick="openSupp(${s.id})">
          <span class="badge ${grp.cls}">${g}</span>
          <div style="flex:1"><div style="font-size:14px;font-weight:500">${s.name}</div><div style="font-size:12px;color:#666;margin-top:2px">${s.verdict.slice(0,58)}…</div></div>
          <span style="color:#555;font-size:18px">›</span>
        </div>`).join("")}
      </div>`;
    });
    el.innerHTML=html;
  } else {
    el.innerHTML=`<div style="overflow-x:auto"><table>
      <thead><tr><th>Grupo</th><th>Suplemento</th><th>Veredicto</th><th></th></tr></thead>
      <tbody>${filtered.map(s=>{const grp=GROUPS[s.g];return`<tr onclick="openSupp(${s.id})" style="cursor:pointer">
        <td><span class="badge ${grp.cls}">${s.g}</span></td>
        <td style="font-weight:500">${s.name}</td>
        <td style="color:#888;font-size:13px">${s.verdict.slice(0,45)}…</td>
        <td style="color:#6366f1;font-size:13px">Ver →</td>
      </tr>`;}).join("")}</tbody>
    </table></div>`;
  }
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll(".filter-btn").forEach(b=>{
    b.className="filter-btn";
  });
  const map={ALL:"active-all",A:"active-a",B:"active-b",C:"active-c",D:"active-d"};
  btn.classList.add(map[f]);
  renderContent();
}

function setView(v,btn){
  currentView=v;
  document.querySelectorAll(".view-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderContent();
}

async function openSupp(id){
  currentSupp=S.find(s=>s.id===id);
  aiText=null; aiLoading=true;
  renderModal();
  document.getElementById("overlay").style.display="flex";
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,
        system:"Eres nutricionista deportivo experto. Responde en español. Usa exactamente estas 4 secciones: 🔬 MECANISMO, 📊 EVIDENCIA, ⚡ PARA QUIÉN, 💊 DOSIS. Máximo 2-3 oraciones por sección. Sin markdown adicional.",
        messages:[{role:"user",content:`Análisis científico del suplemento deportivo: "${currentSupp.name}" (AIS Grupo ${currentSupp.g}).`}]})
    });
    const data=await res.json();
    aiText=data.content?.map(b=>b.text||"").join("")||"Sin respuesta.";
  }catch{aiText="Error al conectar con el análisis.";}
  aiLoading=false;
  renderModal();
}

function renderModal(){
  const s=currentSupp;
  const grp=GROUPS[s.g];
  const aiSection=aiLoading
    ?`<div style="display:flex;flex-direction:column;gap:8px">${[70,90,55,80].map(w=>`<div style="height:11px;background:rgba(255,255,255,0.06);border-radius:4px;width:${w}%;animation:shimmer 1.4s infinite"></div>`).join("")}</div>`
    :aiText?`<div style="font-size:14px;line-height:1.7;color:#aaa">${aiText.split("\n").filter(l=>l.trim()).map(l=>{const isH=l.match(/^[🔬📊⚡💊]/);return`<p style="margin:${isH?"14px 0 5px":"0 0 6px"};font-weight:${isH?"600":"400"};color:${isH?"#a5b4fc":"#aaa"};font-size:${isH?"11px":"14px"};${isH?"text-transform:uppercase;letter-spacing:0.05em":""}">${l}</p>`;}).join("")}</div>`:"";

  document.getElementById("panel").innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
      <div>
        <span class="badge ${grp.cls}" style="margin-bottom:8px;display:inline-block">GRUPO ${s.g} · ${grp.label}</span>
        <h2 style="font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:0.05em;color:#fff;font-weight:400;line-height:1.1">${s.name}</h2>
      </div>
      <button onclick="closeModal()" style="background:rgba(255,255,255,0.07);border:none;color:#888;border-radius:50%;width:32px;height:32px;font-size:1rem;flex-shrink:0;display:flex;align-items:center;justify-content:center">✕</button>
    </div>
    <div style="background:${grp.bg};border:1px solid ${grp.border};border-radius:10px;padding:12px 16px;margin-bottom:12px">
      <div style="font-size:11px;color:${grp.color};text-transform:uppercase;letter-spacing:0.08em;font-weight:700;margin-bottom:4px">Veredicto</div>
      <div style="font-size:14px">${s.verdict}</div>
    </div>
    <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px">
      <span style="color:#555;font-size:11px;text-transform:uppercase;letter-spacing:0.06em;font-weight:600">Dosis base: </span><span style="color:#ccc">${s.dose}</span>
    </div>
    <div style="margin-bottom:16px">
      <div style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;font-weight:600">Fundamento científico</div>
      <div style="font-size:14px;line-height:1.65;color:#888">${s.science}</div>
    </div>
    <div style="border-top:1px solid rgba(255,255,255,0.07);padding-top:14px">
      <div style="font-size:11px;color:#6366f1;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px;font-weight:600">✦ Análisis detallado con IA</div>
      ${aiSection}
    </div>`;
}

function closeModal(){
  document.getElementById("overlay").style.display="none";
  currentSupp=null; aiText=null;
}

renderContent();
</script>
</body>
</html>
